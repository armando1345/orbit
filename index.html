<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Orbit | Armandefica</title>
<meta name="theme-color" content="#0f0a1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Orbit">
<link rel="icon" type="image/svg+xml" href="https://res.cloudinary.com/dul66qlpq/image/upload/v1763503975/Orbit_favicon_qhk2kg.svg">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://res.cloudinary.com/dul66qlpq/image/upload/v1763503975/Orbit_favicon_qhk2kg.svg">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0a1e;--surface:#1a1030;--card:#231640;--border:#2e1f55;
  --green:#39ff7e;--text:#e8e0f5;--muted:#8b7db0;
  --danger:#ef4444;--warning:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .35s ease-out forwards}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{padding:18px 18px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header-brand{font-size:20px;font-weight:900;color:var(--green);letter-spacing:2px}
.header-date{font-size:11px;color:var(--muted);margin-top:2px}
.header-actions{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px}
.icon-btn:hover{border-color:var(--green);color:var(--green)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:20}
.nav-btn{flex:1;padding:10px 0;background:transparent;border:none;border-top:2px solid transparent;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:700;letter-spacing:.5px;transition:all .15s}
.nav-btn.active{border-top-color:var(--green);color:var(--green);background:rgba(57,255,126,.04)}
.nav-btn i{font-size:20px}

/* SCROLL */
.scroll-content{flex:1;overflow-y:auto;padding:0 0 72px}

/* DASHBOARD */
.dash-pad{padding:16px}
.progress-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.progress-pct{font-size:42px;font-weight:900;color:var(--green);line-height:1}
.progress-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.progress-sub{font-size:12px;color:var(--muted);margin-top:4px}
.prog-bar-wrap{background:var(--border);border-radius:4px;height:6px;margin-top:14px;overflow:hidden}
.prog-bar{background:var(--green);height:100%;border-radius:4px;transition:width .5s}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
.stat-icon{font-size:20px}
.stat-val{font-size:28px;font-weight:900;margin:4px 0 2px}
.stat-label{font-size:11px;color:var(--muted)}
.cat-bars-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.cat-bar-row{margin-bottom:12px}
.cat-bar-head{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.cat-bar-track{background:var(--border);border-radius:4px;height:5px}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .5s}

/* CATEGORIES */
.cats-pad{padding:14px}
.cats-grid{display:flex;flex-direction:column;gap:10px}
.cat-card{background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;position:relative}
.cat-card:active{transform:scale(.98)}
.cat-icon-wrap{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-size:15px;font-weight:700;margin-bottom:4px}
.cat-meta{font-size:11px;color:var(--muted)}
.cat-mini-bar{width:60px;height:4px;background:var(--border);border-radius:4px;margin-top:5px;overflow:hidden}
.cat-mini-fill{height:100%;border-radius:4px;transition:width .5s}
.cat-right{text-align:right;flex-shrink:0}
.cat-pending{font-size:22px;font-weight:900}
.urgent-dot{position:absolute;top:10px;right:10px;width:7px;height:7px;background:var(--danger);border-radius:50%;box-shadow:0 0 8px rgba(239,68,68,.7)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;transition:opacity .25s}
.modal-panel{position:fixed;right:0;top:0;bottom:0;width:100%;max-width:480px;background:var(--bg);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;z-index:31;overflow:hidden}
.modal-header{padding:18px 18px 14px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.modal-cat-label{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.modal-cat-title{font-size:22px;font-weight:900}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{color:var(--text);border-color:var(--text)}
.modal-prog-wrap{padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.modal-prog-head{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.modal-prog-head span:first-child{color:var(--muted)}
.modal-filters{padding:10px 14px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.modal-filters::-webkit-scrollbar{display:none}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;white-space:nowrap;transition:all .15s;flex-shrink:0}
.pill.active{border-color:var(--green);color:var(--green);background:rgba(57,255,126,.08)}
.task-list{flex:1;overflow-y:auto;padding:10px 12px 0}
.task-item{background:var(--card);border:1px solid var(--border);border-left:3px solid transparent;border-radius:12px;padding:12px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;transition:all .15s;margin-top:1px;cursor:pointer}
.task-check.done{background:var(--green);border-color:var(--green);color:#0a1a10}
.task-text-wrap{flex:1;min-width:0}
.task-text{font-size:14px;font-weight:600;margin-bottom:5px;word-break:break-word}
.task-text.done{text-decoration:line-through;color:var(--muted)}
.task-badges{display:flex;flex-wrap:wrap;gap:4px}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.task-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.task-act-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-act-btn:hover{color:var(--text);border-color:var(--text)}
.task-act-btn.del:hover{color:var(--danger);border-color:var(--danger)}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-state i{font-size:40px;margin-bottom:12px;display:block}
.empty-state p{font-size:13px}

/* ADD FOOTER */
.add-footer{padding:12px 12px 18px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.task-input-row{display:flex;gap:8px;margin-bottom:8px}
.task-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.task-input:focus{border-color:var(--green)}
.task-input::placeholder{color:var(--muted)}
.add-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--green);color:#0a1a10;font-size:18px;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
.date-chips{display:flex;gap:6px;overflow-x:auto;margin-bottom:8px}
.date-chips::-webkit-scrollbar{display:none}
.date-chip{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;transition:all .15s}
.date-chip.sel{border-color:var(--green);color:var(--green);background:rgba(57,255,126,.08)}
.prio-chips{display:flex;gap:6px}
.prio-chip{flex:1;padding:6px 0;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;transition:all .15s}

/* EDIT INLINE */
.edit-form{background:var(--surface);border:1px solid var(--green);border-radius:12px;padding:12px;margin-bottom:8px}
.edit-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:8px}
.edit-input:focus{border-color:var(--green)}
.edit-footer{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.edit-date{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:11px;flex:1;outline:none;color-scheme:dark;min-width:0}
.edit-save{padding:6px 14px;border-radius:8px;border:none;background:var(--green);color:#0a1a10;font-size:12px;font-weight:700;flex-shrink:0}
.edit-cancel{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;flex-shrink:0}
input[type="datetime-local"]{color-scheme:dark}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div>
      <div class="header-brand">ORBIT</div>
      <div class="header-date" id="date-display"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="downloadBackup()" title="Guardar respaldo"><i class="ph ph-download-simple"></i></button>
      <label class="icon-btn" style="cursor:pointer" title="Restaurar respaldo">
        <i class="ph ph-upload-simple"></i>
        <input type="file" id="backup-file" style="display:none" accept=".json" onchange="loadBackup(this)">
      </label>
    </div>
  </header>

  <div class="scroll-content">
    <!-- DASHBOARD -->
    <div id="view-dashboard" class="dash-pad fade-in">
      <div class="progress-card">
        <div style="flex:1">
          <div class="progress-label">Progreso general</div>
          <div class="progress-pct" id="dash-pct">0%</div>
          <div class="progress-sub" id="dash-sub">0 de 0 tareas</div>
          <div class="prog-bar-wrap"><div class="prog-bar" id="dash-bar" style="width:0%"></div></div>
        </div>
        <svg width="72" height="72" viewBox="0 0 72 72" style="margin-left:16px;flex-shrink:0">
          <circle cx="36" cy="36" r="28" fill="none" stroke="#2e1f55" stroke-width="7"/>
          <circle cx="36" cy="36" r="28" fill="none" stroke="#39ff7e" stroke-width="7"
            id="ring-circle" stroke-dasharray="0 175.9" stroke-linecap="round"
            transform="rotate(-90 36 36)" style="transition:stroke-dasharray .5s"/>
          <text x="36" y="40" text-anchor="middle" fill="#39ff7e" font-size="13" font-weight="900" id="ring-text">0%</text>
        </svg>
      </div>

      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-val" id="stat-overdue" style="color:#ef4444">0</div><div class="stat-label">Vencidas</div></div>
        <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val" id="stat-today" style="color:#f59e0b">0</div><div class="stat-label">Para hoy</div></div>
        <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-val" id="stat-pending" style="color:#a78bfa">0</div><div class="stat-label">Pendientes</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val" id="stat-done" style="color:#39ff7e">0</div><div class="stat-label">Completadas</div></div>
      </div>

      <div class="cat-bars-card">
        <div class="section-title">Por categoría</div>
        <div id="cat-bars"></div>
      </div>
    </div>

    <!-- CATEGORIES -->
    <div id="view-categories" class="cats-pad fade-in" style="display:none">
      <div id="cats-grid" class="cats-grid"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="switchView('dashboard')">
      <i class="ph ph-chart-bar"></i>DASHBOARD
    </button>
    <button class="nav-btn" id="nav-categories" onclick="switchView('categories')">
      <i class="ph ph-squares-four"></i>CATEGORÍAS
    </button>
  </nav>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
<div class="modal-panel" id="modal-panel">
  <div class="modal-header">
    <div>
      <div class="modal-cat-label">CATEGORÍA</div>
      <div class="modal-cat-title" id="modal-title">–</div>
    </div>
    <button class="close-btn" onclick="closeModal()"><i class="ph ph-x"></i></button>
  </div>
  <div class="modal-prog-wrap">
    <div class="modal-prog-head"><span>Progreso</span><span id="m-pct" style="color:var(--green);font-weight:700">0%</span></div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="m-bar" style="width:0%"></div></div>
  </div>
  <div class="modal-filters" id="modal-filters">
    <button class="pill active" onclick="setFilter('all',this)">Todas</button>
    <button class="pill" onclick="setFilter('pending',this)">Pendientes</button>
    <button class="pill" onclick="setFilter('done',this)">Hechas</button>
    <button class="pill" onclick="setFilter('overdue',this)">Vencidas</button>
    <button class="pill" onclick="setFilter('alta',this)">🔴 Alta</button>
    <button class="pill" onclick="setFilter('media',this)">🟡 Media</button>
    <button class="pill" onclick="setFilter('baja',this)">⚪ Baja</button>
  </div>
  <div class="task-list" id="task-list"></div>
  <div class="add-footer">
    <div class="task-input-row">
      <input class="task-input" id="new-task-input" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter')addTask()">
      <button class="add-btn" onclick="addTask()"><i class="ph ph-arrow-right"></i></button>
    </div>
    <div class="date-chips">
      <button class="date-chip" onclick="setQuickDate('today',this)">Hoy tarde</button>
      <button class="date-chip" onclick="setQuickDate('tomorrow',this)">Mañana</button>
      <button class="date-chip" onclick="setQuickDate('friday',this)">Viernes</button>
      <div style="position:relative;flex-shrink:0">
        <input type="datetime-local" id="date-picker" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2" onchange="onDatePick(this)">
        <button class="date-chip" id="custom-date-chip">📅 <span id="custom-lbl">Elegir</span></button>
      </div>
    </div>
    <div class="prio-chips">
      <button class="prio-chip" id="pc-alta" onclick="selPrio('alta')" style="color:#ef4444">🔴 Alta</button>
      <button class="prio-chip" id="pc-media" onclick="selPrio('media')" style="color:#f59e0b;border-color:#f59e0b;background:rgba(245,158,11,.1)">🟡 Media</button>
      <button class="prio-chip" id="pc-baja" onclick="selPrio('baja')">⚪ Baja</button>
    </div>
  </div>
</div>

<script>
const CATS=[
  {id:1,name:"Universidad",      icon:"student",           color:"#7C3AED"},
  {id:2,name:"Armando",          icon:"user-circle",       color:"#39ff7e"},
  {id:3,name:"Coro",             icon:"music-notes",       color:"#EC4899"},
  {id:4,name:"SMD",              icon:"briefcase",         color:"#0EA5E9"},
  {id:5,name:"Círculos de Estudio",icon:"books",           color:"#F59E0B"},
  {id:6,name:"Colegio Esparza",  icon:"buildings",         color:"#10B981"},
  {id:7,name:"Otros",            icon:"dots-three-circle", color:"#8B7DB0"},
];

let data={tasks:{}}, catId=null, editId=null, filter='all', prio='media', selDate='';

function init(){
  document.getElementById('date-display').textContent=
    new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const s=localStorage.getItem('orbit_v4');
  if(s){data=JSON.parse(s);}
  else{
    const old=localStorage.getItem('orbitAppData_v3')||localStorage.getItem('orbitAppData_v2');
    if(old)data=JSON.parse(old);
  }
  injectPWA();
  renderDashboard();
  renderCats();
}

function save(){localStorage.setItem('orbit_v4',JSON.stringify(data));renderDashboard();renderCats();}

// ── PWA ──────────────────────────────────────────
function injectPWA(){
  const m={name:"Orbit | Armandefica",short_name:"Orbit",start_url:".",display:"standalone",
    background_color:"#0f0a1e",theme_color:"#0f0a1e",
    icons:[{src:"https://res.cloudinary.com/dul66qlpq/image/upload/v1763503975/Orbit_favicon_qhk2kg.svg",
      sizes:"any",type:"image/svg+xml",purpose:"any maskable"}]};
  const b=new Blob([JSON.stringify(m)],{type:'application/json'});
  const l=document.createElement('link');l.rel='manifest';l.href=URL.createObjectURL(b);
  document.head.appendChild(l);
  if('serviceWorker' in navigator){
    const sw=`const C='orbit-v1';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./','/orbit/','/orbit/index.html'])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));});
self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).then(r=>{const cl=r.clone();caches.open(C).then(c=>c.put(e.request,cl));return r;}).catch(()=>caches.match(e.request)));});`;
    const sb=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(sb)).catch(()=>{});
  }
}

// ── VIEWS ─────────────────────────────────────────
function switchView(v){
  document.getElementById('view-dashboard').style.display=v==='dashboard'?'block':'none';
  document.getElementById('view-categories').style.display=v==='categories'?'block':'none';
  document.getElementById('nav-dashboard').classList.toggle('active',v==='dashboard');
  document.getElementById('nav-categories').classList.toggle('active',v==='categories');
}

// ── DASHBOARD ─────────────────────────────────────
function renderDashboard(){
  let total=0,done=0,overdue=0,todayC=0;
  const now=new Date(),tod=now.toISOString().split('T')[0];
  CATS.forEach(c=>{
    (data.tasks[c.id]||[]).forEach(t=>{
      total++;
      if(t.done){done++;return;}
      if(t.dueDate){
        const d=new Date(t.dueDate);
        if(d<now)overdue++;
        else if(d.toISOString().split('T')[0]===tod)todayC++;
      }
    });
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('dash-pct').textContent=pct+'%';
  document.getElementById('dash-sub').textContent=`${done} de ${total} tareas completadas`;
  document.getElementById('dash-bar').style.width=pct+'%';
  document.getElementById('ring-circle').setAttribute('stroke-dasharray',`${pct*1.759} 175.9`);
  document.getElementById('ring-text').textContent=pct+'%';
  document.getElementById('stat-overdue').textContent=overdue;
  document.getElementById('stat-today').textContent=todayC;
  document.getElementById('stat-pending').textContent=total-done;
  document.getElementById('stat-done').textContent=done;
  const bars=document.getElementById('cat-bars');bars.innerHTML='';
  CATS.forEach(c=>{
    const ts=data.tasks[c.id]||[],t=ts.length,d=ts.filter(x=>x.done).length,p=t?Math.round(d/t*100):0;
    bars.innerHTML+=`<div class="cat-bar-row"><div class="cat-bar-head"><span>${c.name}</span><span style="color:var(--muted)">${d}/${t} · ${p}%</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${p}%;background:${c.color}"></div></div></div>`;
  });
}

// ── CATEGORIES ────────────────────────────────────
function renderCats(){
  const grid=document.getElementById('cats-grid');grid.innerHTML='';
  const now=new Date();
  CATS.forEach(c=>{
    const ts=data.tasks[c.id]||[],t=ts.length,d=ts.filter(x=>x.done).length,pct=t?Math.round(d/t*100):0;
    const urgent=ts.filter(x=>!x.done&&x.dueDate&&new Date(x.dueDate)<now).length;
    const el=document.createElement('div');el.className='cat-card fade-in';
    el.style.borderLeftColor=c.color;el.onclick=()=>openModal(c.id);
    el.innerHTML=`${urgent?'<div class="urgent-dot"></div>':''}
      <div class="cat-icon-wrap" style="background:${c.color}18"><i class="ph ph-${c.icon}" style="color:${c.color}"></i></div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <div class="cat-meta">${t} tareas · ${pct}% completado</div>
        <div class="cat-mini-bar"><div class="cat-mini-fill" style="width:${pct}%;background:${c.color}"></div></div>
      </div>
      <div class="cat-right">
        <div class="cat-pending" style="color:${c.color}">${t-d}</div>
        <div style="font-size:10px;color:var(--muted)">pendientes</div>
      </div>`;
    grid.appendChild(el);
  });
}

// ── MODAL ─────────────────────────────────────────
function openModal(id){
  catId=id;filter='all';editId=null;prio='media';selDate='';
  const c=CATS.find(x=>x.id===id);
  document.getElementById('modal-title').textContent=c.name;
  document.getElementById('modal-title').style.color=c.color;
  document.querySelectorAll('#modal-filters .pill').forEach(p=>p.classList.remove('active'));
  document.querySelector('#modal-filters .pill').classList.add('active');
  resetForm();renderTasks();
  document.getElementById('modal-overlay').style.opacity='1';
  document.getElementById('modal-overlay').style.pointerEvents='auto';
  document.getElementById('modal-panel').style.transform='translateX(0)';
}
function closeModal(){
  document.getElementById('modal-overlay').style.opacity='0';
  document.getElementById('modal-overlay').style.pointerEvents='none';
  document.getElementById('modal-panel').style.transform='translateX(100%)';
  catId=null;editId=null;
}
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('#modal-filters .pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');renderTasks();
}

// ── TASKS ─────────────────────────────────────────
function dueStatus(dt,done){
  if(done)return'done';if(!dt)return'none';
  const d=new Date(dt),now=new Date(),diff=Math.floor((d-now)/86400000);
  if(diff<0)return'overdue';if(diff===0)return'today';if(diff===1)return'tomorrow';if(diff<=7)return'week';return'future';
}
function dueBadge(dt,done){
  if(!dt||done)return'';
  const s=dueStatus(dt,done),d=new Date(dt);
  const ds=d.toLocaleString('es-ES',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const m={overdue:{l:`⚠️ Vencida · ${ds}`,bg:'#450a0a',c:'#fca5a5'},today:{l:`🕐 Hoy · ${ds}`,bg:'#422006',c:'#fcd34d'},
    tomorrow:{l:`📅 Mañana · ${ds}`,bg:'#1c3a2a',c:'#6ee7b7'},week:{l:`📅 ${ds}`,bg:'#1e1b4b',c:'#a5b4fc'},
    future:{l:`📅 ${ds}`,bg:'#1a1030',c:'#8b7db0'}};
  const b=m[s];return b?`<span class="badge" style="background:${b.bg};color:${b.c}">${b.l}</span>`:'';
}
function prioBadge(p){
  const m={alta:{l:'🔴 Alta',bg:'rgba(239,68,68,.15)',c:'#ef4444'},
    media:{l:'🟡 Media',bg:'rgba(245,158,11,.15)',c:'#f59e0b'},
    baja:{l:'⚪ Baja',bg:'rgba(139,125,176,.15)',c:'#8b7db0'}};
  const b=m[p||'baja'];
  return`<span class="badge" style="background:${b.bg};color:${b.c}">${b.l}</span>`;
}

function renderTasks(){
  const list=document.getElementById('task-list');
  const tasks=data.tasks[catId]||[];
  const now=new Date();
  const t=tasks.length,d=tasks.filter(x=>x.done).length,pct=t?Math.round(d/t*100):0;
  document.getElementById('m-pct').textContent=pct+'%';
  document.getElementById('m-bar').style.width=pct+'%';
  let ft=tasks.filter(t=>{
    if(filter==='pending')return!t.done;
    if(filter==='done')return t.done;
    if(filter==='overdue')return dueStatus(t.dueDate,t.done)==='overdue';
    if(['alta','media','baja'].includes(filter))return(t.prio||'baja')===filter&&!t.done;
    return true;
  });
  ft.sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const po={alta:0,media:1,baja:2};
    const pd=(po[a.prio||'baja'])-(po[b.prio||'baja']);
    if(pd!==0)return pd;
    if(a.dueDate&&b.dueDate)return new Date(a.dueDate)-new Date(b.dueDate);
    return 0;
  });
  list.innerHTML='';
  if(!ft.length){
    list.innerHTML=`<div class="empty-state"><i class="ph ph-check-circle"></i><p>Sin tareas aquí.<br><span style="color:var(--green);cursor:pointer" onclick="document.getElementById('new-task-input').focus()">+ Nueva tarea</span></p></div>`;
    return;
  }
  ft.forEach(t=>{
    const el=document.createElement('div');
    if(editId===t.id){
      el.innerHTML=`<div class="edit-form">
        <input class="edit-input" id="ei-${t.id}" value="${t.text.replace(/"/g,'&quot;')}">
        <div class="edit-footer">
          <input type="datetime-local" class="edit-date" id="ed-${t.id}" value="${t.dueDate||''}">
          <button class="edit-cancel" onclick="cancelEdit()">Cancelar</button>
          <button class="edit-save" onclick="saveEdit(${t.id})">Guardar</button>
        </div>
      </div>`;
    } else {
      const ds=dueStatus(t.dueDate,t.done);
      const bc=ds==='overdue'?'#ef4444':ds==='today'?'#f59e0b':'transparent';
      el.innerHTML=`<div class="task-item" style="border-left-color:${t.done?'transparent':bc}">
        <div class="task-check${t.done?' done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
        <div class="task-text-wrap">
          <div class="task-text${t.done?' done':''}">${t.text}</div>
          <div class="task-badges">${prioBadge(t.prio)}${dueBadge(t.dueDate,t.done)}</div>
        </div>
        <div class="task-actions">
          <button class="task-act-btn" onclick="startEdit(${t.id})"><i class="ph ph-pencil-simple"></i></button>
          <button class="task-act-btn del" onclick="delTask(${t.id})"><i class="ph ph-trash"></i></button>
        </div>
      </div>`;
    }
    list.appendChild(el);
  });
}

function toggleTask(id){const t=(data.tasks[catId]||[]).find(x=>x.id===id);if(t){t.done=!t.done;save();renderTasks();}}
function startEdit(id){editId=id;renderTasks();}
function cancelEdit(){editId=null;renderTasks();}
function saveEdit(id){
  const txt=document.getElementById('ei-'+id).value.trim();
  const dt=document.getElementById('ed-'+id).value;
  if(txt){const t=(data.tasks[catId]||[]).find(x=>x.id===id);if(t){t.text=txt;t.dueDate=dt||null;t.notified=false;save();}}
  editId=null;renderTasks();
}
function delTask(id){if(confirm('¿Borrar tarea?')){data.tasks[catId]=(data.tasks[catId]||[]).filter(x=>x.id!==id);save();renderTasks();}}

// ── ADD TASK ──────────────────────────────────────
function selPrio(p){
  prio=p;
  const cols={alta:'#ef4444',media:'#f59e0b',baja:'#8b7db0'};
  ['alta','media','baja'].forEach(x=>{
    const b=document.getElementById('pc-'+x);
    if(x===p){b.style.borderColor=cols[x];b.style.color=cols[x];b.style.background=cols[x]+'18';}
    else{b.style.borderColor='var(--border)';b.style.color='var(--muted)';b.style.background='transparent';}
  });
}
function setQuickDate(type,btn){
  const d=new Date();
  if(type==='today'){d.setHours(18,0,0,0);if(d<new Date())d.setHours(21,0,0,0);}
  else if(type==='tomorrow'){d.setDate(d.getDate()+1);d.setHours(9,0,0,0);}
  else if(type==='friday'){const day=d.getDay(),diff=5-day+(day>=5?7:0);d.setDate(d.getDate()+diff);d.setHours(17,0,0,0);}
  const pad=n=>String(n).padStart(2,'0');
  selDate=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  document.getElementById('date-picker').value=selDate;
  document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('custom-lbl').textContent=d.toLocaleString('es-ES',{weekday:'short',hour:'2-digit',minute:'2-digit'});
}
function onDatePick(input){
  selDate=input.value;
  document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('sel'));
  if(input.value){
    document.getElementById('custom-date-chip').classList.add('sel');
    const d=new Date(input.value);
    document.getElementById('custom-lbl').textContent=d.toLocaleString('es-ES',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  } else {document.getElementById('custom-lbl').textContent='Elegir';}
}
function addTask(){
  const inp=document.getElementById('new-task-input'),txt=inp.value.trim();
  if(!txt)return;
  if(!data.tasks[catId])data.tasks[catId]=[];
  data.tasks[catId].push({id:Date.now(),text:txt,done:false,prio,dueDate:selDate||null,notified:false});
  resetForm();save();renderTasks();
}
function resetForm(){
  document.getElementById('new-task-input').value='';
  selDate='';
  document.getElementById('date-picker').value='';
  document.getElementById('custom-lbl').textContent='Elegir';
  document.querySelectorAll('.date-chip').forEach(c=>c.classList.remove('sel'));
  selPrio('media');
}

// ── BACKUP ───────────────────────────────────────
function downloadBackup(){
  const a=document.createElement('a');
  a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(data));
  a.download=`orbit_backup_${new Date().toISOString().split('T')[0]}.json`;a.click();
}
function loadBackup(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{data=JSON.parse(e.target.result);save();alert('Restaurado con éxito.');}catch{alert('Archivo inválido');}};
  r.readAsText(file);
}

init();
</script>
